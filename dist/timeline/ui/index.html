<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neurobuttr Timeline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      line-height: 1.6;
    }

    .container { max-width: 960px; margin: 0 auto; padding: 24px; }

    /* Header bar — like GitHub repo header */
    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }
    .page-header svg { flex-shrink: 0; }
    .page-header h1 { color: #f0f6fc; font-size: 1.3em; font-weight: 600; }
    .project-path {
      color: #8b949e;
      font-size: 0.85em;
      font-family: monospace;
      margin-bottom: 4px;
    }
    .header-stats {
      display: flex;
      gap: 16px;
      font-size: 0.85em;
      color: #8b949e;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #21262d;
    }
    .header-stats span { display: flex; align-items: center; gap: 4px; }

    /* Commit-style session list */
    .commit-list {
      border: 1px solid #30363d;
      border-radius: 6px;
      overflow: hidden;
    }
    .commit-group-header {
      background: #161b22;
      padding: 8px 16px;
      font-size: 0.85em;
      font-weight: 600;
      color: #8b949e;
      border-bottom: 1px solid #30363d;
    }
    .commit-row {
      display: flex;
      align-items: flex-start;
      padding: 12px 16px;
      border-bottom: 1px solid #21262d;
      cursor: pointer;
      transition: background 0.1s;
    }
    .commit-row:last-child { border-bottom: none; }
    .commit-row:hover { background: #161b22; }

    .commit-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #21262d;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-right: 12px;
      font-size: 0.75em;
      color: #8b949e;
      border: 1px solid #30363d;
    }
    .commit-avatar.has-changes { background: #1b4332; color: #3fb950; border-color: #238636; }

    .commit-body { flex: 1; min-width: 0; }
    .commit-message {
      color: #f0f6fc;
      font-size: 0.95em;
      font-weight: 500;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .commit-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 0.75em;
      color: #8b949e;
    }
    .commit-meta .sep { color: #30363d; }

    .commit-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .commit-sha {
      font-family: monospace;
      font-size: 0.8em;
      color: #58a6ff;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 8px;
    }
    .file-count {
      font-size: 0.75em;
      color: #3fb950;
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 12px;
      font-size: 0.7em;
      font-weight: 500;
    }
    .badge-completed { background: #1b4332; color: #2dd4bf; }
    .badge-error { background: #4c1d1d; color: #f87171; }
    .badge-rolled_back { background: #2d333b; color: #8b949e; }

    /* Detail view — like GitHub commit detail */
    .back-link {
      color: #58a6ff;
      cursor: pointer;
      font-size: 0.85em;
      margin-bottom: 16px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .back-link:hover { text-decoration: underline; }

    .detail-header {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .detail-title {
      color: #f0f6fc;
      font-size: 1.2em;
      font-weight: 600;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 20px;
      font-size: 0.85em;
      color: #8b949e;
    }
    .detail-meta-item { display: flex; align-items: center; gap: 4px; }
    .detail-meta-label { color: #6e7681; }
    .detail-meta-value { color: #c9d1d9; }

    /* Summary stats bar — like GitHub's "Showing X changed files" */
    .stats-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 16px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 0.85em;
      color: #8b949e;
    }
    .stat-item { display: flex; align-items: center; gap: 4px; }
    .stat-green { color: #3fb950; }
    .stat-red { color: #f85149; }
    .stat-blue { color: #58a6ff; }

    /* Files changed — like GitHub's file tree */
    .files-panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .files-panel-header {
      padding: 10px 16px;
      font-size: 0.85em;
      font-weight: 600;
      color: #f0f6fc;
      border-bottom: 1px solid #30363d;
      background: #1c2128;
    }
    .file-row {
      padding: 6px 16px;
      font-family: monospace;
      font-size: 0.8em;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .file-row:last-child { border-bottom: none; }
    .file-icon { color: #3fb950; font-size: 0.9em; }
    .file-name { color: #58a6ff; }

    /* Action timeline — like GitHub's commit activity */
    .timeline-section-header {
      color: #f0f6fc;
      font-size: 0.95em;
      font-weight: 600;
      margin: 20px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .timeline-count {
      font-size: 0.8em;
      font-weight: 400;
      color: #8b949e;
      background: #21262d;
      padding: 0 8px;
      border-radius: 10px;
    }

    .action {
      border-left: 2px solid #30363d;
      padding: 6px 0 6px 16px;
      margin-left: 10px;
      margin-bottom: 2px;
      position: relative;
    }
    .action::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 14px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #30363d;
    }
    .action.action-tool_use::before { background: #d2a8ff; }
    .action.action-reasoning::before { background: #8b949e; }
    .action.action-tool_result-ok::before { background: #3fb950; }
    .action.action-tool_result-err::before { background: #f85149; }

    .action-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85em;
      margin-bottom: 2px;
    }
    .action-tool { color: #d2a8ff; font-weight: 600; }
    .action-label { color: #8b949e; font-size: 0.8em; }
    .action-index { color: #484f58; font-size: 0.75em; font-family: monospace; }
    .action-summary {
      color: #8b949e;
      font-family: monospace;
      font-size: 0.8em;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .reasoning-text {
      color: #8b949e;
      font-size: 0.85em;
      font-style: italic;
      white-space: pre-wrap;
      max-height: 60px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }
    .reasoning-text.expanded { max-height: none; }
    .reasoning-text:not(.expanded)::after {
      content: 'click to expand';
      position: absolute;
      bottom: 0;
      right: 0;
      background: linear-gradient(to right, transparent, #0d1117 30%);
      padding-left: 40px;
      color: #58a6ff;
      font-style: normal;
      font-size: 0.8em;
    }

    .diff-block {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 8px 12px;
      margin-top: 4px;
      font-family: monospace;
      font-size: 0.8em;
      white-space: pre;
      overflow-x: auto;
      line-height: 1.4;
    }
    .diff-add { color: #3fb950; }
    .diff-del { color: #f85149; }
    .diff-hunk { color: #6e7681; }

    .tool-output {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 8px 12px;
      margin-top: 4px;
      font-family: monospace;
      font-size: 0.8em;
      white-space: pre-wrap;
      max-height: 50px;
      overflow: hidden;
      cursor: pointer;
    }
    .tool-output.expanded { max-height: none; }
    .error-output { border-color: #f8514933; }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #8b949e;
    }
    .empty-state h2 { color: #c9d1d9; margin-bottom: 8px; font-size: 1.1em; }
    .empty-state p { font-size: 0.9em; }

    /* Subagent cards */
    .subagent-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 6px;
    }
    .subagent-card .commit-message { font-size: 0.9em; }
  </style>
</head>
<body>
  <div class="container">
    <div id="app"></div>
  </div>

  <script>
    const app = document.getElementById('app');
    let currentView = 'list';

    function timeAgo(ms) {
      const secs = Math.floor((Date.now() - ms) / 1000);
      if (secs < 60) return 'just now';
      const mins = Math.floor(secs / 60);
      if (mins < 60) return mins + 'm ago';
      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + 'h ago';
      const days = Math.floor(hours / 24);
      if (days < 7) return days + 'd ago';
      return new Date(ms).toLocaleDateString();
    }

    function formatDate(ms) {
      return new Date(ms).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric'
      });
    }

    function duration(start, end) {
      const secs = Math.round((end - start) / 1000);
      if (secs < 60) return secs + 's';
      const mins = Math.floor(secs / 60);
      if (mins < 60) return mins + 'm ' + (secs % 60) + 's';
      const hours = Math.floor(mins / 60);
      return hours + 'h ' + (mins % 60) + 'm';
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // Strip any remaining XML-like tags from prompts for display
    function cleanPrompt(text) {
      return text
        .replace(/<ide_opened_file>[\s\S]*?<\/ide_opened_file>/g, '')
        .replace(/<ide_selection>[\s\S]*?<\/ide_selection>/g, '')
        .replace(/<system-reminder>[\s\S]*?<\/system-reminder>/g, '')
        .replace(/<available-deferred-tools>[\s\S]*?<\/available-deferred-tools>/g, '')
        .trim() || '(IDE session)';
    }

    function truncate(s, len) {
      if (s.length <= len) return s;
      return s.slice(0, len) + '...';
    }

    // Group sessions by date (like GitHub commit history)
    function groupByDate(sessions) {
      const groups = {};
      for (const s of sessions) {
        const key = formatDate(s.startedAt);
        if (!groups[key]) groups[key] = [];
        groups[key].push(s);
      }
      return groups;
    }

    function renderDiff(patch) {
      return patch.split('\n').map(line => {
        const esc = escapeHtml(line);
        if (line.startsWith('+')) return '<span class="diff-add">' + esc + '</span>';
        if (line.startsWith('-')) return '<span class="diff-del">' + esc + '</span>';
        if (line.startsWith('@@')) return '<span class="diff-hunk">' + esc + '</span>';
        return esc;
      }).join('\n');
    }

    function toolLabel(name) {
      const labels = {
        'Edit': 'edited', 'Write': 'created', 'Read': 'read',
        'Bash': 'ran command', 'Grep': 'searched', 'Glob': 'searched files',
        'Agent': 'dispatched agent', 'TodoWrite': 'updated tasks',
      };
      return labels[name] || 'used ' + name;
    }

    function renderAction(action) {
      if (action.type === 'reasoning') {
        const text = escapeHtml(action.reasoning);
        const needsExpand = action.reasoning.length > 150;
        return '<div class="action action-reasoning">' +
          '<div class="action-header">' +
            '<span class="action-label">Thinking</span>' +
            '<span class="action-index">#' + action.index + '</span>' +
          '</div>' +
          '<div class="reasoning-text' + (needsExpand ? '' : ' expanded') + '" onclick="this.classList.toggle(\'expanded\')">' + text + '</div>' +
          '</div>';
      }

      if (action.type === 'tool_use') {
        let summary = '';
        const inp = action.toolInput || {};
        if (action.toolName === 'Edit' || action.toolName === 'Write' || action.toolName === 'Read') {
          summary = inp.file_path || '';
        } else if (action.toolName === 'Bash') {
          const cmd = String(inp.command || '');
          summary = '$ ' + (cmd.length > 80 ? cmd.slice(0, 80) + '...' : cmd);
        } else if (action.toolName === 'Grep' || action.toolName === 'Glob') {
          summary = inp.pattern || '';
        } else {
          summary = JSON.stringify(inp).slice(0, 80);
        }

        let diffHtml = '';
        if (action.fileDiff) {
          diffHtml = '<div class="diff-block">' + renderDiff(action.fileDiff.patch) + '</div>';
        }

        const inputJson = JSON.stringify(action.toolInput, null, 2);
        const inputHtml = '<div class="tool-output" onclick="this.classList.toggle(\'expanded\')">' + escapeHtml(inputJson) + '</div>';

        return '<div class="action action-tool_use">' +
          '<div class="action-header">' +
            '<span class="action-tool">' + escapeHtml(action.toolName) + '</span>' +
            '<span class="action-label">' + toolLabel(action.toolName) + '</span>' +
            '<span class="action-index">#' + action.index + '</span>' +
          '</div>' +
          (summary ? '<div class="action-summary">' + escapeHtml(summary) + '</div>' : '') +
          diffHtml +
          inputHtml +
          '</div>';
      }

      if (action.type === 'tool_result') {
        const cls = action.isError ? 'action-tool_result-err' : 'action-tool_result-ok';
        const label = action.isError ? 'Error' : 'Success';
        const output = action.toolOutput || '';
        const outCls = action.isError ? 'tool-output error-output' : 'tool-output';
        return '<div class="action ' + cls + '">' +
          '<div class="action-header">' +
            '<span class="action-label">' + label + '</span>' +
            '<span class="action-index">#' + action.index + '</span>' +
          '</div>' +
          (output ? '<div class="' + outCls + '" onclick="this.classList.toggle(\'expanded\')">' + escapeHtml(output) + '</div>' : '') +
          '</div>';
      }

      return '';
    }

    async function showList() {
      currentView = 'list';
      const res = await fetch('/api/sessions');
      const data = await res.json();

      const svgIcon = '<svg width="20" height="20" viewBox="0 0 16 16" fill="#8b949e"><path d="M1.643 3.143L.427 1.927A.25.25 0 000 2.104V5.75c0 .138.112.25.25.25h3.646a.25.25 0 00.177-.427L2.715 4.215a6.5 6.5 0 11-1.18 4.458.75.75 0 10-1.493.154 8.001 8.001 0 101.6-5.684zM7.75 4a.75.75 0 01.75.75v2.992l2.028.812a.75.75 0 01-.557 1.392l-2.5-1A.75.75 0 017 8.25v-3.5A.75.75 0 017.75 4z"/></svg>';

      if (!data.sessions || data.sessions.length === 0) {
        app.innerHTML =
          '<div class="page-header">' + svgIcon + '<h1>Neurobuttr Timeline</h1></div>' +
          '<div class="project-path">' + escapeHtml(data.projectPath || '') + '</div>' +
          '<div class="empty-state">' +
            '<h2>No sessions yet</h2>' +
            '<p>Use Claude Code on this project, then reopen the Timeline to see what it did.</p>' +
          '</div>';
        return;
      }

      // Count totals
      const totalFiles = new Set(data.sessions.flatMap(s => s.filesModified)).size;
      const totalActions = data.sessions.reduce((sum, s) => sum + s.actionCount, 0);

      let html = '<div class="page-header">' + svgIcon + '<h1>Neurobuttr Timeline</h1></div>' +
        '<div class="project-path">' + escapeHtml(data.projectPath) + '</div>' +
        '<div class="header-stats">' +
          '<span><strong>' + data.sessions.length + '</strong> sessions</span>' +
          '<span><strong>' + totalFiles + '</strong> files touched</span>' +
          '<span><strong>' + totalActions + '</strong> actions taken</span>' +
        '</div>';

      // Group by date
      const groups = groupByDate(data.sessions);

      html += '<div class="commit-list">';
      for (const [date, sessions] of Object.entries(groups)) {
        html += '<div class="commit-group-header">Sessions on ' + escapeHtml(date) + '</div>';
        for (const s of sessions) {
          const prompt = cleanPrompt(truncate(s.prompt, 100));
          const hasChanges = s.filesModified.length > 0;
          const avatarCls = hasChanges ? 'commit-avatar has-changes' : 'commit-avatar';
          const avatarText = hasChanges ? s.filesModified.length : '0';

          html += '<div class="commit-row" onclick="showDetail(\'' + s.id + '\')">' +
            '<div class="' + avatarCls + '">' + avatarText + '</div>' +
            '<div class="commit-body">' +
              '<div class="commit-message">' + escapeHtml(prompt) + '</div>' +
              '<div class="commit-meta">' +
                '<span>' + escapeHtml(s.model) + '</span>' +
                '<span class="sep">&middot;</span>' +
                '<span>' + timeAgo(s.startedAt) + '</span>' +
                '<span class="sep">&middot;</span>' +
                '<span>' + s.actionCount + ' actions</span>' +
                '<span class="sep">&middot;</span>' +
                '<span class="badge badge-' + s.status + '">' + s.status + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="commit-right">' +
              '<span class="commit-sha">' + s.id.slice(0, 7) + '</span>' +
            '</div>' +
          '</div>';
        }
      }
      html += '</div>';

      app.innerHTML = html;
    }

    async function showDetail(id) {
      currentView = 'detail';
      const res = await fetch('/api/sessions/' + id);
      if (!res.ok) {
        app.innerHTML = '<span class="back-link" onclick="showList()">&larr; All sessions</span><p>Session not found.</p>';
        return;
      }
      const s = await res.json();
      const prompt = cleanPrompt(s.prompt);

      let html = '<span class="back-link" onclick="showList()">&larr; All sessions</span>';

      // Header — like a commit detail page
      html += '<div class="detail-header">' +
        '<div class="detail-title">' + escapeHtml(prompt) + '</div>' +
        '<div class="detail-meta">' +
          '<div class="detail-meta-item"><span class="detail-meta-label">Model</span> <span class="detail-meta-value">' + escapeHtml(s.model) + '</span></div>' +
          '<div class="detail-meta-item"><span class="detail-meta-label">Duration</span> <span class="detail-meta-value">' + duration(s.startedAt, s.completedAt) + '</span></div>' +
          '<div class="detail-meta-item"><span class="detail-meta-label">Branch</span> <span class="detail-meta-value">' + escapeHtml(s.gitBranch) + '</span></div>' +
          '<div class="detail-meta-item"><span class="detail-meta-label">Version</span> <span class="detail-meta-value">' + escapeHtml(s.claudeCodeVersion) + '</span></div>' +
          '<div class="detail-meta-item"><span class="detail-meta-label">Status</span> <span class="badge badge-' + s.status + '">' + s.status + '</span></div>' +
          '<div class="detail-meta-item"><span class="detail-meta-label">ID</span> <span class="detail-meta-value" style="font-family:monospace">' + s.id.slice(0, 8) + '</span></div>' +
          (s.tags.length ? '<div class="detail-meta-item"><span class="detail-meta-label">Tags</span> <span class="detail-meta-value">' + escapeHtml(s.tags.join(', ')) + '</span></div>' : '') +
          (s.notes ? '<div class="detail-meta-item"><span class="detail-meta-label">Notes</span> <span class="detail-meta-value">' + escapeHtml(s.notes) + '</span></div>' : '') +
        '</div>' +
        '</div>';

      // Stats bar
      const reads = s.filesRead ? s.filesRead.length : 0;
      const edits = s.filesModified.length;
      html += '<div class="stats-bar">' +
        '<span class="stat-item">Showing <strong>' + s.actions.length + '</strong> actions</span>' +
        '<span class="stat-item stat-green">+' + edits + ' files changed</span>' +
        '<span class="stat-item stat-blue">' + reads + ' files read</span>' +
        '</div>';

      // Files changed
      if (s.filesModified.length > 0) {
        html += '<div class="files-panel">' +
          '<div class="files-panel-header">Files changed (' + s.filesModified.length + ')</div>';
        for (const f of s.filesModified) {
          html += '<div class="file-row"><span class="file-icon">M</span><span class="file-name">' + escapeHtml(f) + '</span></div>';
        }
        html += '</div>';
      }

      // Action timeline
      html += '<div class="timeline-section-header">Agent activity <span class="timeline-count">' + s.actions.length + '</span></div>';
      for (const action of s.actions) {
        html += renderAction(action);
      }

      // Subagents
      if (s.subagentSessions && s.subagentSessions.length > 0) {
        html += '<div class="timeline-section-header">Sub-agents <span class="timeline-count">' + s.subagentSessions.length + '</span></div>';
        for (const sub of s.subagentSessions) {
          const p = cleanPrompt(truncate(sub.prompt, 80));
          html += '<div class="subagent-card">' +
            '<div class="commit-message">' + escapeHtml(p) + '</div>' +
            '<div class="commit-meta">' +
              '<span>' + sub.actions.length + ' actions</span>' +
              '<span class="sep">&middot;</span>' +
              '<span>' + (sub.filesModified ? sub.filesModified.length : 0) + ' files</span>' +
            '</div>' +
          '</div>';
        }
      }

      app.innerHTML = html;
    }

    // SSE for live updates
    const evtSource = new EventSource('/api/events');
    evtSource.addEventListener('session-update', () => {
      if (currentView === 'list') showList();
    });

    // Initial load
    showList();
  </script>
