<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neurobuttr Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0e14;
      --bg-secondary: #0d1117;
      --bg-tertiary: #161b22;
      --bg-hover: #1c2128;
      --border: #1b2028;
      --border-light: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #c9d1d9;
      --text-muted: #8b949e;
      --text-faint: #484f58;
      --text-ghost: #30363d;
      --blue: #58a6ff;
      --green: #3fb950;
      --red: #f47067;
      --orange: #f0883e;
      --yellow: #d4a72c;
      --purple: #a5b4fc;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-secondary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top bar */
    .topbar {
      height: 40px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
      z-index: 20;
    }
    .topbar-left { display: flex; align-items: center; gap: 8px; }
    .topbar-logo { font-size: 0.82em; font-weight: 600; color: var(--text-primary); letter-spacing: -0.3px; }
    .topbar-sep { color: var(--border-light); }
    .topbar-project { font-size: 0.78em; color: var(--text-muted); font-family: 'SF Mono', 'Fira Code', monospace; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .topbar-stat { font-size: 0.72em; color: var(--text-faint); display: flex; align-items: center; gap: 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .dot-live { background: var(--green); box-shadow: 0 0 6px rgba(63,185,80,0.4); }
    .dot-dead { background: var(--red); }
    .btn {
      background: #21262d; border: 1px solid var(--border-light); color: var(--text-secondary);
      font-size: 0.72em; padding: 3px 10px; border-radius: 4px; cursor: pointer;
    }
    .btn:hover { background: var(--border-light); border-color: var(--blue); color: var(--text-primary); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .disconnected {
      background: #4c1d1d; color: #f87171; text-align: center;
      font-size: 0.75em; padding: 3px; display: none; flex-shrink: 0;
    }
    .disconnected.visible { display: block; }

    .main-layout { flex: 1; display: flex; overflow: hidden; }

    /* Left sidebar */
    .left-sidebar {
      width: 220px; min-width: 140px; max-width: 400px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
    }
    .ls-section { padding: 8px 12px 4px; flex-shrink: 0; }
    .ls-heading {
      font-size: 0.62em; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-faint); margin-bottom: 4px;
      cursor: pointer; user-select: none; display: flex; align-items: center; gap: 4px;
    }
    .ls-heading::before { content: '\25BE'; font-size: 0.8em; transition: transform 0.15s; }
    .ls-heading.collapsed::before { transform: rotate(-90deg); }
    .ls-item {
      display: flex; align-items: center; gap: 6px; padding: 3px 8px;
      font-size: 0.74em; color: var(--text-muted); border-radius: 4px;
      cursor: pointer; transition: background 0.1s;
    }
    .ls-item:hover { background: var(--bg-hover); color: var(--text-secondary); }
    .ls-item.active { background: rgba(88,166,255,0.1); color: var(--blue); }
    .ls-icon { width: 14px; text-align: center; flex-shrink: 0; font-size: 0.8em; }
    .ls-badge {
      margin-left: auto; font-size: 0.8em; color: var(--text-faint);
      background: var(--bg-primary); padding: 0 5px; border-radius: 8px;
      min-width: 18px; text-align: center;
    }
    .ls-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .ls-list {
      overflow-y: auto; transition: max-height 0.2s ease;
    }
    .ls-list.collapsed { max-height: 0 !important; overflow: hidden; }
    .ls-list::-webkit-scrollbar { width: 4px; }
    .ls-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .ls-stat-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 2px 8px; font-size: 0.72em; color: var(--text-faint);
    }
    .ls-stat-val { color: var(--text-muted); font-weight: 500; }

    .right-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Column headers */
    .col-headers {
      display: flex; align-items: center; height: 28px;
      background: var(--bg-secondary); border-bottom: 1px solid var(--border);
      flex-shrink: 0; font-size: 0.65em; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-faint);
      user-select: none;
    }
    .col-graph { width: 100px; flex-shrink: 0; border-right: 1px solid var(--border); padding-left: 6px; }
    .col-type { width: 58px; flex-shrink: 0; padding: 0 4px; }
    .col-desc { flex: 1; padding: 0 8px; min-width: 0; }
    .col-approval { width: 48px; flex-shrink: 0; text-align: center; }
    .col-author { width: 36px; flex-shrink: 0; text-align: center; }
    .col-time { width: 90px; flex-shrink: 0; text-align: right; padding-right: 10px; }

    /* Table */
    .table-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
    .table-scroll::-webkit-scrollbar { width: 6px; }
    .table-scroll::-webkit-scrollbar-track { background: transparent; }
    .table-scroll::-webkit-scrollbar-thumb { background: #21262d; border-radius: 3px; }

    /* Row */
    .row {
      display: flex; align-items: center; height: 32px;
      border-bottom: 1px solid rgba(27,32,40,0.4);
      cursor: pointer; transition: background 0.08s;
    }
    .row:hover { background: var(--bg-hover); }
    .row.selected { background: rgba(88,166,255,0.07); }
    .row.branch-row { background: rgba(88,166,255,0.02); }
    .row.branch-row:hover { background: rgba(88,166,255,0.06); }
    .row.merge-row { background: rgba(35,134,54,0.02); }

    /* Graph cell — SVG rendered per row */
    .cell-graph {
      width: 100px; height: 32px; flex-shrink: 0;
      border-right: 1px solid rgba(27,32,40,0.3);
      overflow: hidden;
    }
    .cell-graph svg { display: block; width: 100px; height: 32px; }

    /* Type badge */
    .cell-type { width: 58px; flex-shrink: 0; padding: 0 4px; display: flex; align-items: center; }
    .type-badge {
      font-size: 0.56em; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.4px; padding: 1px 4px; border-radius: 3px; white-space: nowrap;
    }
    .tb-edit { background: #162d1f; color: var(--green); }
    .tb-bash { background: #2d1618; color: var(--red); }
    .tb-search { background: #152035; color: #79c0ff; }
    .tb-read { background: #16181e; color: var(--text-muted); }
    .tb-prompt { background: #1e1f26; color: var(--text-primary); }
    .tb-decision { background: #261f0e; color: var(--yellow); }
    .tb-insight { background: #2a1a0a; color: var(--orange); }
    .tb-agent { background: #171b2e; color: var(--purple); }
    .tb-other { background: #16181e; color: var(--text-faint); }

    .cell-desc {
      flex: 1; padding: 0 8px; min-width: 0;
      font-size: 0.76em; color: var(--text-faint);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }
    /* User prompts — warm yellow to stand out */
    .cell-desc.desc-user { color: #e3c78a; }
    /* Critical actions: edits, decisions — bright white */
    .cell-desc.desc-critical { color: var(--text-primary); }
    /* Normal actions: bash, reads — secondary color */
    .cell-desc.desc-normal { color: var(--text-secondary); }
    /* Minor actions: agent work, search, grep, misc — faded */
    .cell-desc.desc-minor { color: var(--text-faint); }
    .cell-desc.branch-name {
      color: var(--blue); font-weight: 500;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .cell-desc .merge-label { color: var(--green); font-weight: 500; }

    /* Copy button in detail panel */
    .copy-btn {
      background: var(--bg-tertiary); border: 1px solid var(--border-light); color: var(--text-muted);
      font-size: 0.72em; padding: 3px 8px; border-radius: 4px; cursor: pointer;
      float: right; margin-left: 8px;
    }
    .copy-btn:hover { background: var(--border-light); color: var(--text-primary); }
    .copy-btn.copied { color: var(--green); border-color: var(--green); }

    .cell-approval { width: 48px; flex-shrink: 0; text-align: center; font-size: 0.72em; }
    .approval-yes { color: var(--yellow); font-size: 0.8em; }
    .approval-no { color: var(--text-ghost); font-size: 0.75em; }

    .cell-author {
      width: 36px; flex-shrink: 0; text-align: center;
      font-size: 0.6em; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .author-user { color: var(--text-muted); }
    .author-ai { color: var(--blue); }

    .cell-time {
      width: 90px; flex-shrink: 0; text-align: right; padding-right: 10px;
      font-size: 0.66em; color: var(--text-faint); white-space: nowrap;
    }

    /* Detail panel */
    .detail-panel {
      height: 200px; min-height: 80px;
      background: var(--bg-secondary); border-top: 1px solid var(--border);
      display: flex; flex-shrink: 0;
    }
    .detail-left {
      width: 220px; min-width: 120px; max-width: 500px;
      border-right: 1px solid var(--border); padding: 10px 12px;
      overflow-y: auto; font-size: 0.78em;
    }
    .detail-left::-webkit-scrollbar { width: 4px; }
    .detail-left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .detail-right { flex: 1; padding: 10px 16px; overflow-y: auto; }
    .detail-right::-webkit-scrollbar { width: 4px; }
    .detail-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .detail-title {
      font-size: 0.72em; font-weight: 600; color: var(--text-primary);
      margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
    }
    .detail-label {
      font-size: 0.62em; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-faint); margin: 8px 0 3px;
    }
    .detail-content {
      font-size: 0.78em; color: var(--text-secondary); line-height: 1.5;
      font-family: 'SF Mono', 'Fira Code', monospace;
      word-break: break-word; white-space: pre-wrap;
    }
    .detail-empty {
      font-size: 0.78em; color: var(--text-ghost); padding: 30px 0; text-align: center;
    }
    .detail-badge { display: inline-block; font-size: 0.85em; padding: 1px 5px; border-radius: 3px; }
    .detail-insight {
      padding: 6px 8px; background: var(--bg-primary); border: 1px solid var(--border);
      border-radius: 4px; margin-bottom: 6px; font-size: 0.85em;
      color: var(--text-secondary); line-height: 1.4;
    }
    .detail-insight-src { font-size: 0.82em; color: var(--text-faint); margin-top: 3px; }
    .detail-actions { display: flex; gap: 6px; margin-top: 8px; }
    .detail-actions .btn { font-size: 0.82em; padding: 3px 10px; }
    .btn-green { background: #238636; border-color: #238636; color: #fff; }
    .btn-green:hover { background: #2ea043; }

    .empty-state {
      display: flex; align-items: center; justify-content: center;
      height: 100%; flex-direction: column; gap: 8px;
    }
    .empty-title { font-size: 0.95em; color: var(--text-faint); }
    .empty-sub { font-size: 0.78em; color: var(--text-ghost); }

    /* Resize handles */
    .resize-h {
      width: 4px; cursor: col-resize; background: transparent;
      flex-shrink: 0; position: relative; z-index: 5; transition: background 0.15s;
    }
    .resize-h:hover, .resize-h.active { background: var(--blue); opacity: 0.5; }
    .resize-v {
      height: 4px; cursor: row-resize; background: transparent;
      flex-shrink: 0; position: relative; z-index: 5; transition: background 0.15s;
    }
    .resize-v:hover, .resize-v.active { background: var(--blue); opacity: 0.5; }
    body.resizing { cursor: col-resize; user-select: none; }
    body.resizing-v { cursor: row-resize; user-select: none; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">neurobuttr</span>
      <span class="topbar-sep">/</span>
      <span class="topbar-project" id="project-name">...</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-stat"><span class="dot dot-live" id="status-dot"></span> <span id="status-text">connecting</span></span>
    </div>
  </div>
  <div class="disconnected" id="disconnected-banner">Connection lost. Reconnecting...</div>

  <div class="main-layout">
    <div class="left-sidebar" id="left-sidebar">
      <div class="ls-section">
        <div class="ls-stat-row">Actions <span class="ls-stat-val" id="ls-actions">0</span></div>
        <div class="ls-stat-row">Chats <span class="ls-stat-val" id="ls-sessions">0</span></div>
        <div class="ls-stat-row">Branches <span class="ls-stat-val" id="ls-branches">0</span></div>
        <div class="ls-stat-row">Insights <span class="ls-stat-val" id="ls-insights">0</span></div>
      </div>
      <div class="ls-section"><div class="ls-heading" onclick="toggleSection(this, 'ls-session-list')">Chat Sessions</div></div>
      <div class="ls-list" id="ls-session-list"></div>
      <div class="ls-section"><div class="ls-heading" onclick="toggleSection(this, 'ls-branch-list')">Branches</div></div>
      <div class="ls-list" id="ls-branch-list"></div>
      <div class="ls-section" id="ls-insights-section" style="display:none;">
        <div class="ls-heading" onclick="toggleSection(this, 'ls-insight-list')">Insights</div>
        <div class="ls-list" id="ls-insight-list"></div>
      </div>
    </div>

    <div class="resize-h" id="resize-sidebar"></div>

    <div class="right-content">
      <div class="col-headers">
        <div class="col-graph">Graph</div>
        <div class="col-type">Type</div>
        <div class="col-desc">Description</div>
        <div class="col-approval">Appvl</div>
        <div class="col-author">Who</div>
        <div class="col-time">Time</div>
      </div>
      <div class="table-scroll" id="table-scroll"></div>
      <div class="resize-v" id="resize-detail"></div>
      <div class="detail-panel" id="detail-panel">
        <div class="detail-left" id="detail-left">
          <div class="detail-empty">Select an event to see details</div>
        </div>
        <div class="resize-h" id="resize-detail-split"></div>
        <div class="detail-right" id="detail-right">
          <div class="detail-empty">Event content will appear here</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let session = null, ws = null, wsConnected = false;
    let selectedId = null, filterBranchId = null, filterSessionId = null;

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function trunc(s, n) { return s.length > n ? s.slice(0, n) + '...' : s; }
    function formatTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      const now = new Date();
      const time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
      if (d.toDateString() === now.toDateString()) return 'Today ' + time;
      const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
      if (d.toDateString() === yesterday.toDateString()) return 'Yesterday ' + time;
      const month = d.toLocaleDateString([], { month: 'short', day: 'numeric' });
      return month + ' ' + time;
    }

    // Sidebar section collapse/expand
    function toggleSection(heading, listId) {
      heading.classList.toggle('collapsed');
      const list = document.getElementById(listId);
      if (list) list.classList.toggle('collapsed');
    }

    // Dynamic sidebar section heights — distribute available space
    function updateSidebarHeights() {
      const sidebar = document.getElementById('left-sidebar');
      if (!sidebar) return;
      const sidebarH = sidebar.clientHeight;
      const fixedH = sidebar.querySelector('.ls-section') ?
        Array.from(sidebar.querySelectorAll('.ls-section')).reduce((s, el) => s + el.offsetHeight, 0) : 80;
      const lists = sidebar.querySelectorAll('.ls-list:not(.collapsed)');
      if (lists.length === 0) return;
      const available = Math.max(sidebarH - fixedH - 10, 100);
      const each = Math.floor(available / lists.length);
      lists.forEach(el => { el.style.maxHeight = each + 'px'; });
    }

    // Description emphasis based on action type
    function descEmphasis(actionType, role) {
      if (actionType === 'prompt' && role === 'user') return 'desc-user';
      if (actionType === 'edit' || actionType === 'decision' || actionType === 'insight') return 'desc-critical';
      if (actionType === 'bash' || actionType === 'read') return 'desc-normal';
      return 'desc-minor'; // search, agent, other, misc
    }

    // Copy to clipboard
    function copyContent(btn) {
      const text = document.getElementById('detail-right').innerText;
      navigator.clipboard.writeText(text).then(() => {
        btn.classList.add('copied');
        btn.textContent = 'Copied';
        setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'Copy'; }, 1500);
      });
    }

    // Branch colors (cycle through these for different branches)
    const BRANCH_COLORS = ['#58a6ff', '#a5b4fc', '#79c0ff', '#d4a72c', '#f0883e', '#3fb950', '#f47067', '#bc8cff'];
    const MAIN_COLOR = '#58a6ff';

    // Graph layout constants
    let GW = 100; // graph cell width (dynamic, updated in render)
    const GH = 32;  // graph cell height
    const LANE_W = 20; // pixels per lane
    const LANE_X0 = 16; // first lane X offset

    function laneX(lane) { return LANE_X0 + lane * LANE_W; }

    // Compute graph width based on number of lanes needed
    function computeGraphWidth() {
      const chatSessions = (session && session.chatSessions) || [];
      const numSessions = Math.max(chatSessions.length, 1);
      // Account for session lanes + potential branch lanes (estimate ~2 extra)
      const lanes = numSessions + 3;
      return Math.max(100, LANE_X0 + lanes * LANE_W + 10);
    }

    // ---- WebSocket ----
    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host + '/ws');
      ws.onopen = () => {
        wsConnected = true;
        document.getElementById('status-dot').className = 'dot dot-live';
        document.getElementById('status-text').textContent = 'live';
        document.getElementById('disconnected-banner').classList.remove('visible');
        document.getElementById('btn-branch').disabled = false;
      };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'state') { session = msg.session; render(); }
        else if (msg.type === 'patch') { ws.send(JSON.stringify({ action: 'request_state' })); }
      };
      ws.onclose = () => {
        wsConnected = false;
        document.getElementById('status-dot').className = 'dot dot-dead';
        document.getElementById('status-text').textContent = 'disconnected';
        document.getElementById('disconnected-banner').classList.add('visible');
        document.getElementById('btn-branch').disabled = true;
        setTimeout(connect, 2000);
      };
      ws.onerror = () => { ws.close(); };
    }
    function send(a) { if (ws && wsConnected) ws.send(JSON.stringify(a)); }

    function promptBranch() { const t = prompt('Branch topic:'); if (t) send({ action: 'create_branch', data: { topic: t } }); }
    function doCheckout(b) { send({ action: 'checkout', data: { branchId: b } }); }
    function doResolve(b) { send({ action: 'resolve', data: { branchId: b } }); }
    function doMerge(b) { send({ action: 'merge_insights', data: { branchId: b } }); }
    function filterAll() { filterBranchId = null; filterSessionId = null; render(); }
    function filterBranch(b) { filterBranchId = b; filterSessionId = null; render(); }
    function filterSession(s) { filterSessionId = s; filterBranchId = null; render(); }

    function badgeCls(at) { return 'type-badge tb-' + (at || 'other'); }
    function badgeLbl(at) {
      return { edit:'EDIT', bash:'BASH', search:'SRCH', read:'READ', prompt:'PRMT', decision:'DCSN', insight:'INSG', agent:'AGNT', other:'MISC' }[at] || 'MISC';
    }

    // ---- SVG station marker ----
    function svgMarker(cx, cy, actionType, role, color) {
      const isUser = role === 'user';
      const stroke = isUser ? '#484f58' : color;
      const glow = isUser ? '' : ` filter="url(#glow-${color.replace('#','')})"`;
      const r = 4;
      switch (actionType) {
        case 'bash':
          return `<rect x="${cx-r}" y="${cy-r}" width="${r*2}" height="${r*2}" rx="2" fill="#0a0e14" stroke="${stroke}" stroke-width="2"${glow}/>`;
        case 'search': {
          const h = r * 1.8;
          return `<polygon points="${cx},${cy-h/2} ${cx-r},${cy+h/2} ${cx+r},${cy+h/2}" fill="#0a0e14" stroke="${stroke}" stroke-width="2" stroke-linejoin="round"${glow}/>`;
        }
        case 'read':
          return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#0a0e14" stroke="${stroke}" stroke-width="1.5" stroke-dasharray="3 2"${glow}/>`;
        case 'decision':
          return `<rect x="${cx-r*0.8}" y="${cy-r*0.8}" width="${r*1.6}" height="${r*1.6}" rx="1" transform="rotate(45 ${cx} ${cy})" fill="#0a0e14" stroke="${stroke}" stroke-width="2"${glow}/>`;
        case 'insight':
          return `<rect x="${cx-r*0.8}" y="${cy-r*0.8}" width="${r*1.6}" height="${r*1.6}" rx="1" transform="rotate(45 ${cx} ${cy})" fill="#f0883e" stroke="#f0883e" stroke-width="1"/>`;
        default:
          return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#0a0e14" stroke="${stroke}" stroke-width="2"${glow}/>`;
      }
    }

    // ---- Build row list with lane assignments ----
    // Each chat session gets its own lane (metro line). Agent branches fork off their parent session's lane.
    function buildRows(mainMsgs, branches) {
      const rows = [];
      const chatSessions = session.chatSessions || [];

      // Assign session lanes using interval-graph coloring:
      // Sessions that don't overlap in time can share the same lane.
      // Sort by start time and greedily assign to the first available lane.
      const sessionLane = {};
      const sessionColor = {};
      const sorted = [...chatSessions].sort((a, b) => a.startedAt - b.startedAt);
      const laneEndTimes = []; // laneEndTimes[i] = when the last session on lane i ended

      for (const cs of sorted) {
        // Find the first lane whose last session ended before this one started
        let assigned = -1;
        for (let i = 0; i < laneEndTimes.length; i++) {
          if (laneEndTimes[i] <= cs.startedAt) { assigned = i; break; }
        }
        if (assigned === -1) { assigned = laneEndTimes.length; laneEndTimes.push(0); }
        laneEndTimes[assigned] = cs.endedAt;
        sessionLane[cs.id] = assigned;
        sessionColor[cs.id] = cs.color || BRANCH_COLORS[assigned % BRANCH_COLORS.length];
      }
      const numSessionLanes = Math.max(laneEndTimes.length, 1);

      // Index branches by parent message
      const branchByParent = {};
      for (const b of branches) {
        if (!branchByParent[b.parentMessageId]) branchByParent[b.parentMessageId] = [];
        branchByParent[b.parentMessageId].push(b);
      }

      // Branch color map (agent branches use their parent session color with some offset)
      const branchColor = {};
      for (let i = 0; i < branches.length; i++) {
        branchColor[branches[i].id] = BRANCH_COLORS[i % BRANCH_COLORS.length];
      }

      // --- Filtered views ---
      if (filterBranchId) {
        const b = branches.find(x => x.id === filterBranchId);
        if (b) {
          const color = branchColor[b.id] || MAIN_COLOR;
          rows.push({ kind: 'branch-header', branch: b, branchId: b.id, color });
          for (const m of (b.messages || [])) {
            rows.push({ kind: 'branch-station', msg: m, branch: b, branchId: b.id, color });
          }
          if (b.resolved) {
            const merged = (session.insights || []).filter(i => i.sourceBranchId === b.id && i.merged);
            rows.push({ kind: 'merge', branch: b, branchId: b.id, color, count: merged.length });
          }
        }
        for (const r of rows) { r.lane = 0; r.activeLanes = { 0: r.color || MAIN_COLOR }; }
        return rows;
      }

      // Filter messages by session if a session filter is active
      let filteredMsgs = mainMsgs;
      if (filterSessionId) {
        filteredMsgs = mainMsgs.filter(m => m.sourceSessionId === filterSessionId);
      }

      // Build flat list with branchId and sourceSessionId annotations
      for (const m of filteredMsgs) {
        const at = m.actionType || (m.role === 'user' ? 'prompt' : 'other');
        const sid = m.sourceSessionId || null;
        rows.push({ kind: 'main', msg: { ...m, actionType: at }, branchId: null, sourceSessionId: sid });

        const forked = branchByParent[m.id] || [];
        for (const b of forked) {
          const color = branchColor[b.id] || MAIN_COLOR;
          rows.push({ kind: 'branch-header', branch: b, branchId: b.id, color, sourceSessionId: sid });
          for (const bm of (b.messages || [])) {
            rows.push({ kind: 'branch-station', msg: bm, branch: b, branchId: b.id, color, sourceSessionId: sid });
          }
          if (b.resolved) {
            const merged = (session.insights || []).filter(i => i.sourceBranchId === b.id && i.merged);
            rows.push({ kind: 'merge', branch: b, branchId: b.id, color, count: merged.length, sourceSessionId: sid });
          }
        }
      }

      // Orphaned branches
      for (const b of branches) {
        if (!filteredMsgs.some(m => m.id === b.parentMessageId) && !branchByParent[b.parentMessageId]) {
          if (filterSessionId) continue; // skip orphans when filtering by session
          const color = branchColor[b.id] || MAIN_COLOR;
          rows.push({ kind: 'branch-header', branch: b, branchId: b.id, color, sourceSessionId: null });
          for (const bm of (b.messages || [])) {
            rows.push({ kind: 'branch-station', msg: bm, branch: b, branchId: b.id, color, sourceSessionId: null });
          }
          if (b.resolved) {
            const merged = (session.insights || []).filter(i => i.sourceBranchId === b.id && i.merged);
            rows.push({ kind: 'merge', branch: b, branchId: b.id, color, count: merged.length, sourceSessionId: null });
          }
        }
      }

      // Pass 2: assign lanes
      // Session lanes are fixed (each session gets a permanent lane).
      // Agent branches get dynamic lanes above the session lanes.
      const branchToLane = {};
      const branchLaneUsed = new Set(); // tracks dynamic branch lanes
      let nextBranchLane = numSessionLanes; // branch lanes start after session lanes

      function allocBranchLane() {
        for (let i = numSessionLanes; i < numSessionLanes + 20; i++) {
          if (!branchLaneUsed.has(i)) { branchLaneUsed.add(i); if (i >= nextBranchLane) nextBranchLane = i + 1; return i; }
        }
        return nextBranchLane++;
      }

      // Track which session lanes are active (have had first message but not last)
      const sessionFirstSeen = {};
      const sessionLastSeen = {};
      for (const r of rows) {
        const sid = r.sourceSessionId;
        if (sid && !(sid in sessionFirstSeen)) sessionFirstSeen[sid] = rows.indexOf(r);
        if (sid) sessionLastSeen[sid] = rows.indexOf(r);
      }

      for (let i = 0; i < rows.length; i++) {
        const r = rows[i];
        const sid = r.sourceSessionId;

        if (r.kind === 'main') {
          // Assign to this message's session lane
          const sLane = (sid && sid in sessionLane) ? sessionLane[sid] : 0;
          r.lane = sLane;
          r.color = (sid && sessionColor[sid]) || MAIN_COLOR;
        } else if (r.kind === 'branch-header') {
          const parentLane = (sid && sid in sessionLane) ? sessionLane[sid] : 0;
          const lane = allocBranchLane();
          branchToLane[r.branchId] = lane;
          r.lane = lane;
          r.forkFromLane = parentLane;
        } else if (r.kind === 'branch-station') {
          r.lane = branchToLane[r.branchId] || numSessionLanes;
        } else if (r.kind === 'merge') {
          r.lane = branchToLane[r.branchId] || numSessionLanes;
          const parentLane = (sid && sid in sessionLane) ? sessionLane[sid] : 0;
          r.mergeToLane = parentLane;
        }

        // Build active lanes snapshot
        const active = {};
        // Add session lanes that are active at this row index
        for (const cs of chatSessions) {
          const first = sessionFirstSeen[cs.id];
          const last = sessionLastSeen[cs.id];
          if (first !== undefined && i >= first && i <= last) {
            active[sessionLane[cs.id]] = sessionColor[cs.id] || MAIN_COLOR;
          }
        }
        // If no chat sessions, always show lane 0
        if (chatSessions.length === 0) {
          active[0] = MAIN_COLOR;
        }
        // Add active branch lanes
        for (const [bid, lane] of Object.entries(branchToLane)) {
          if (branchLaneUsed.has(lane)) {
            active[lane] = branchColor[bid] || MAIN_COLOR;
          }
        }
        r.activeLanes = active;

        // Free branch lane after last row of a branch
        if (r.kind === 'merge' || r.kind === 'branch-station' || r.kind === 'branch-header') {
          const next = rows[i + 1];
          const isLastOfBranch = !next || next.branchId !== r.branchId;
          if (isLastOfBranch && r.branchId) {
            const lane = branchToLane[r.branchId];
            if (lane !== undefined) branchLaneUsed.delete(lane);
          }
        }
      }

      return rows;
    }

    // ---- Render graph SVG for one row ----
    function renderGraphSVG(row, prevRow, nextRow) {
      const cy = GH / 2;
      const mx = laneX(0); // main lane x
      const bx = laneX(row.lane); // this row's lane x
      let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${GW}" height="${GH}">`;

      // Glow filters for colors we'll use
      const colors = new Set([MAIN_COLOR]);
      if (row.color) colors.add(row.color);
      for (const c of colors) {
        const id = c.replace('#', '');
        svg += `<filter id="glow-${id}"><feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="${c}" flood-opacity="0.6"/></filter>`;
      }

      // Draw vertical line segments for each active lane
      const lanes = row.activeLanes || { 0: MAIN_COLOR };
      for (const [laneStr, color] of Object.entries(lanes)) {
        const lane = parseInt(laneStr);
        const x = laneX(lane);
        const chatSessions = (session && session.chatSessions) || [];
        const numSLanes = Math.max(chatSessions.length, 1);
        const isSessionLane = lane < numSLanes;
        const opacity = isSessionLane ? 0.4 : 0.3;

        // Skip drawing the branch lane line on fork/merge rows — the curve handles it
        if (row.kind === 'branch-header' && row.forkFromLane !== undefined && lane === row.lane) continue;
        if (row.kind === 'merge' && row.mergeToLane !== undefined && lane === row.lane) continue;

        // Check connectivity with prev/next rows
        const prevHas = prevRow && prevRow.activeLanes && (prevRow.activeLanes[lane] !== undefined);
        const nextHas = nextRow && nextRow.activeLanes && (nextRow.activeLanes[lane] !== undefined);

        if (prevHas && nextHas) {
          svg += `<line x1="${x}" y1="0" x2="${x}" y2="${GH}" stroke="${color}" stroke-width="2" opacity="${opacity}"/>`;
        } else if (prevHas && !nextHas) {
          // Line ends at center (station here)
          svg += `<line x1="${x}" y1="0" x2="${x}" y2="${cy}" stroke="${color}" stroke-width="2" opacity="${opacity}"/>`;
        } else if (!prevHas && nextHas) {
          // Line starts at center
          svg += `<line x1="${x}" y1="${cy}" x2="${x}" y2="${GH}" stroke="${color}" stroke-width="2" opacity="${opacity}"/>`;
        } else if (isSessionLane) {
          // Session lanes draw full height when active
          svg += `<line x1="${x}" y1="0" x2="${x}" y2="${GH}" stroke="${color}" stroke-width="2" opacity="${opacity}"/>`;
        }
      }

      // Fork curve: smooth bezier from main lane to branch lane
      if (row.kind === 'branch-header' && row.forkFromLane !== undefined) {
        const fromX = laneX(row.forkFromLane);
        const toX = laneX(row.lane);
        // Curve from top-center of cell to branch lane center
        svg += `<path d="M ${fromX} 0 Q ${fromX} ${cy}, ${toX} ${cy}" fill="none" stroke="${row.color}" stroke-width="2" opacity="0.6" stroke-linecap="round"/>`;
        // Branch lane continues down from station
        if (nextRow && nextRow.branchId === row.branchId) {
          svg += `<line x1="${toX}" y1="${cy}" x2="${toX}" y2="${GH}" stroke="${row.color}" stroke-width="2" opacity="0.3"/>`;
        }
      }

      // Merge curve: from branch lane to main lane
      if (row.kind === 'merge' && row.mergeToLane !== undefined) {
        const fromX = laneX(row.lane);
        const toX = laneX(row.mergeToLane);
        // Branch lane comes in from top, curves to main
        svg += `<line x1="${fromX}" y1="0" x2="${fromX}" y2="${cy}" stroke="${row.color}" stroke-width="2" opacity="0.3"/>`;
        svg += `<path d="M ${fromX} ${cy} Q ${fromX} ${GH}, ${toX} ${GH}" fill="none" stroke="#3fb950" stroke-width="2" opacity="0.6" stroke-linecap="round"/>`;
      }

      // Station markers — draw last so they're on top
      if (row.kind === 'main') {
        svg += svgMarker(laneX(row.lane), cy, row.msg.actionType, row.msg.role, row.color || MAIN_COLOR);
      } else if (row.kind === 'branch-station') {
        svg += svgMarker(bx, cy, row.msg.actionType, row.msg.role, row.color);
      } else if (row.kind === 'branch-header') {
        svg += `<circle cx="${bx}" cy="${cy}" r="3.5" fill="${row.color}" opacity="0.8"/>`;
        svg += `<circle cx="${bx}" cy="${cy}" r="1.5" fill="#0a0e14"/>`;
      } else if (row.kind === 'merge') {
        svg += `<circle cx="${laneX(row.lane)}" cy="${cy}" r="3.5" fill="#0a0e14" stroke="#3fb950" stroke-width="1.5"/>`;
      }

      svg += '</svg>';
      return svg;
    }

    // ---- Main render ----
    function renderSessionList(chatSessions) {
      const el = document.getElementById('ls-session-list');
      if (!chatSessions || chatSessions.length === 0) {
        el.innerHTML = '<div class="ls-item active" onclick="filterAll()"><span class="ls-dot" style="background:var(--blue)"></span> All sessions</div>';
        return;
      }
      let html = '<div class="ls-item' + (filterSessionId === null && filterBranchId === null ? ' active' : '') + '" onclick="filterAll()"><span class="ls-icon" style="color:var(--text-muted)">&#9679;</span> All (' + chatSessions.length + ')</div>';
      for (const cs of chatSessions) {
        const active = filterSessionId === cs.id ? ' active' : '';
        html += '<div class="ls-item' + active + '" onclick="filterSession(\'' + cs.id + '\')" title="' + esc(cs.label) + '">' +
          '<span class="ls-dot" style="background:' + cs.color + '"></span>' +
          '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(trunc(cs.label, 20)) + '</span>' +
          '<span class="ls-badge">' + cs.messageCount + '</span></div>';
      }
      el.innerHTML = html;
    }

    function render() {
      if (!session) return;

      // Update dynamic graph width
      GW = computeGraphWidth();
      document.querySelectorAll('.cell-graph, .cell-graph svg').forEach(el => { el.style.width = GW + 'px'; });
      document.querySelectorAll('.col-graph').forEach(el => { el.style.width = GW + 'px'; });

      document.getElementById('project-name').textContent = session.projectPath.split('/').pop() || session.projectPath;
      const branches = session.branches || [];
      const mainMsgs = session.messages || [];
      const insights = session.insights || [];
      const chatSessions = session.chatSessions || [];
      const totalActions = mainMsgs.length + branches.reduce((s, b) => s + (b.messages || []).length, 0);

      document.getElementById('ls-actions').textContent = totalActions;
      document.getElementById('ls-sessions').textContent = chatSessions.length;
      document.getElementById('ls-branches').textContent = branches.length;
      document.getElementById('ls-insights').textContent = insights.length;

      renderSessionList(chatSessions);
      renderBranchList(branches);
      renderInsightsSection(insights, branches);

      const table = document.getElementById('table-scroll');
      if (totalActions === 0) {
        table.innerHTML = '<div class="empty-state"><div class="empty-title">Waiting for conversation activity...</div><div class="empty-sub">Use add_message, nb_branch, or other tools to see events here</div></div>';
        return;
      }

      const rows = buildRows(mainMsgs, branches);
      let html = '';
      for (let i = 0; i < rows.length; i++) {
        const r = rows[i];
        const prev = i > 0 ? rows[i-1] : null;
        const next = i < rows.length - 1 ? rows[i+1] : null;
        const graphSVG = renderGraphSVG(r, prev, next);

        const cls = [];
        if (i === 0) cls.push('first-row');
        if (i === rows.length - 1) cls.push('last-row');

        if (r.kind === 'branch-header') {
          cls.push('branch-row');
          const b = r.branch;
          const status = b.resolved
            ? '<span style="color:var(--text-faint);font-size:0.85em;">resolved</span>'
            : '<span style="color:var(--green);font-size:0.85em;">' + (b.messages || []).length + ' actions</span>';
          const sel = selectedId === 'bh-' + b.id ? ' selected' : '';
          html += '<div class="row ' + cls.join(' ') + sel + '" onclick="selectBranch(\'' + b.id + '\')">' +
            '<div class="cell-graph">' + graphSVG + '</div>' +
            '<div class="cell-type"><span class="type-badge tb-agent">BRCH</span></div>' +
            '<div class="cell-desc branch-name" style="color:' + r.color + '">&#9095; ' + esc(b.name) + ' ' + status + '</div>' +
            '<div class="cell-approval"></div><div class="cell-author"></div>' +
            '<div class="cell-time">' + formatTime(b.createdAt) + '</div></div>';
        } else if (r.kind === 'merge') {
          cls.push('merge-row');
          html += '<div class="row ' + cls.join(' ') + '">' +
            '<div class="cell-graph">' + graphSVG + '</div>' +
            '<div class="cell-type"></div>' +
            '<div class="cell-desc"><span class="merge-label">&#8627; ' + (r.count > 0 ? 'merged ' + r.count + ' insight' + (r.count !== 1 ? 's' : '') : 'completed') + '</span></div>' +
            '<div class="cell-approval"></div><div class="cell-author"></div><div class="cell-time"></div></div>';
        } else {
          // main or branch-station
          const m = r.msg;
          const at = m.actionType || 'other';
          const isBranch = r.kind === 'branch-station';
          const approval = m.requiresApproval;
          const appHTML = approval === true
            ? '<span class="approval-yes" title="Required approval">&#9679;</span>'
            : '<span class="approval-no">&mdash;</span>';
          const authCls = m.role === 'user' ? 'author-user' : 'author-ai';
          const authLbl = m.role === 'user' ? 'YOU' : 'AI';
          const sel = selectedId === m.id ? ' selected' : '';
          const bid = isBranch ? r.branch.id : '';

          html += '<div class="row ' + cls.join(' ') + sel + '" onclick="selectStation(\'' + m.id + '\',\'' + bid + '\')">' +
            '<div class="cell-graph">' + graphSVG + '</div>' +
            '<div class="cell-type"><span class="' + badgeCls(at) + '">' + badgeLbl(at) + '</span></div>' +
            '<div class="cell-desc ' + descEmphasis(at, m.role) + '" title="' + esc(m.content) + '">' + esc(trunc(m.content, 90)) + '</div>' +
            '<div class="cell-approval">' + appHTML + '</div>' +
            '<div class="cell-author"><span class="' + authCls + '">' + authLbl + '</span></div>' +
            '<div class="cell-time">' + formatTime(m.timestamp) + '</div></div>';
        }
      }
      table.innerHTML = html;
      updateSidebarHeights();
    }

    function renderBranchList(branches) {
      let html = '<div class="ls-item' + (filterBranchId === null ? ' active' : '') + '" onclick="filterAll()"><span class="ls-icon" style="color:var(--blue)">&#9679;</span> main</div>';
      for (let i = 0; i < branches.length; i++) {
        const b = branches[i];
        const active = filterBranchId === b.id ? ' active' : '';
        const color = BRANCH_COLORS[i % BRANCH_COLORS.length];
        const dotColor = b.resolved ? 'var(--text-faint)' : color;
        html += '<div class="ls-item' + active + '" onclick="filterBranch(\'' + b.id + '\')">' +
          '<span class="ls-dot" style="background:' + dotColor + '"></span>' +
          '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(trunc(b.name, 22)) + '</span>' +
          '<span class="ls-badge">' + (b.messages || []).length + '</span></div>';
      }
      document.getElementById('ls-branch-list').innerHTML = html;
    }

    function renderInsightsSection(insights, branches) {
      const sec = document.getElementById('ls-insights-section');
      if (insights.length === 0) { sec.style.display = 'none'; return; }
      sec.style.display = 'block';
      let html = '';
      for (const ins of insights.slice(0, 8)) {
        const tag = ins.merged ? '&#10003;' : '&#9670;';
        const c = ins.merged ? 'var(--green)' : 'var(--orange)';
        html += '<div class="ls-item" style="align-items:flex-start"><span class="ls-icon" style="color:' + c + '">' + tag + '</span><span style="font-size:0.9em;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(trunc(ins.content, 35)) + '</span></div>';
      }
      document.getElementById('ls-insight-list').innerHTML = html;
    }

    // ---- Selection / Detail ----
    function selectStation(msgId, branchId) {
      selectedId = msgId;
      render();
      let msg = null, branch = null;
      if (branchId) {
        branch = (session.branches || []).find(b => b.id === branchId);
        if (branch) msg = (branch.messages || []).find(m => m.id === msgId);
      }
      if (!msg) msg = (session.messages || []).find(m => m.id === msgId);
      if (!msg) return;

      const at = msg.actionType || 'other';
      let left = '<div class="detail-title"><span class="detail-badge ' + badgeCls(at) + '">' + badgeLbl(at) + '</span> Event Detail</div>';
      left += '<div class="detail-label">Type</div><div class="detail-content">' + at + '</div>';
      left += '<div class="detail-label">Role</div><div class="detail-content">' + (msg.role === 'user' ? 'User' : 'AI Agent') + '</div>';
      left += '<div class="detail-label">Time</div><div class="detail-content">' + formatTime(msg.timestamp) + '</div>';
      left += '<div class="detail-label">Approval</div><div class="detail-content">' + (msg.requiresApproval ? '<span style="color:var(--yellow)">Required</span>' : '<span style="color:var(--text-faint)">Auto-approved</span>') + '</div>';
      if (msg.eventKey) {
        left += '<div class="detail-label">Event Key</div><div class="detail-content"><code style="background:var(--surface-alt);padding:2px 6px;border-radius:3px;font-size:12px;color:var(--green);cursor:pointer;user-select:all" onclick="navigator.clipboard.writeText(\'nb:' + msg.eventKey + '\');this.style.color=\'var(--yellow)\';setTimeout(()=>this.style.color=\'var(--green)\',800)" title="Click to copy">nb:' + msg.eventKey + '</code></div>';
      }
      if (branch) {
        left += '<div class="detail-label">Branch</div><div class="detail-content" style="color:var(--blue)">' + esc(branch.name) + '</div>';
        if (!branch.resolved) {
          left += '<div class="detail-actions">';
          left += '<button class="btn" onclick="doCheckout(\'' + branch.id + '\')">Checkout</button>';
          left += '<button class="btn" onclick="doResolve(\'' + branch.id + '\')">Resolve</button>';
          left += '<button class="btn btn-green" onclick="doMerge(\'' + branch.id + '\')">Merge</button>';
          left += '</div>';
        }
      }
      document.getElementById('detail-left').innerHTML = left;
      let right = '<button class="copy-btn" onclick="copyContent(this)">Copy</button>';
      right += '<div class="detail-label">Content</div><div class="detail-content">' + esc(msg.content) + '</div>';
      if (msg.agentId) right += '<div class="detail-label">Agent</div><div class="detail-content" style="color:var(--purple)">Subagent dispatched — view branch for full exploration</div>';
      document.getElementById('detail-right').innerHTML = right;
    }

    function selectBranch(branchId) {
      selectedId = 'bh-' + branchId;
      render();
      const branch = (session.branches || []).find(b => b.id === branchId);
      if (!branch) return;
      const msgs = branch.messages || [];
      const bi = (session.insights || []).filter(i => i.sourceBranchId === branchId);

      let left = '<div class="detail-title"><span style="color:var(--blue)">&#9095;</span> ' + esc(branch.name) + '</div>';
      left += '<div class="detail-label">Status</div><div class="detail-content">' + (branch.resolved ? '<span style="color:var(--text-faint)">Resolved</span>' : '<span style="color:var(--green)">Active</span>') + '</div>';
      left += '<div class="detail-label">Actions</div><div class="detail-content">' + msgs.length + '</div>';
      left += '<div class="detail-label">Insights</div><div class="detail-content">' + bi.length + '</div>';
      left += '<div class="detail-label">Created</div><div class="detail-content">' + formatTime(branch.createdAt) + '</div>';
      if (!branch.resolved) {
        left += '<div class="detail-actions">';
        left += '<button class="btn" onclick="doCheckout(\'' + branchId + '\')">Checkout</button>';
        left += '<button class="btn" onclick="doResolve(\'' + branchId + '\')">Resolve</button>';
        left += '<button class="btn btn-green" onclick="doMerge(\'' + branchId + '\')">Merge</button></div>';
      }
      document.getElementById('detail-left').innerHTML = left;

      let right = '<button class="copy-btn" onclick="copyContent(this)">Copy</button>';
      if (branch.anchorContext) right += '<div class="detail-label">Context</div><div class="detail-content">' + esc(branch.anchorContext) + '</div>';
      if (bi.length > 0) {
        right += '<div class="detail-label">Insights</div>';
        for (const ins of bi) {
          right += '<div class="detail-insight"><span style="color:var(--orange);margin-right:4px">&#9670;</span> ' + esc(ins.content) +
            '<div class="detail-insight-src">' + (ins.merged ? '<span style="color:var(--green)">merged</span>' : 'pending') + '</div></div>';
        }
      }
      if (!right) right = '<div class="detail-content" style="color:var(--text-faint)">No additional details</div>';
      document.getElementById('detail-right').innerHTML = right;
    }

    // ---- Resizable panels ----
    function setupResize(id, dir, target, min, max, apply) {
      const h = document.getElementById(id);
      h.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const el = document.getElementById(target);
        const startP = dir === 'h' ? e.clientX : e.clientY;
        const startS = dir === 'h' ? el.offsetWidth : el.offsetHeight;
        h.classList.add('active');
        document.body.classList.add(dir === 'h' ? 'resizing' : 'resizing-v');
        function onM(e) {
          const d = (dir === 'h' ? e.clientX : e.clientY) - startP;
          apply(el, Math.max(min, Math.min(max, startS + d)));
        }
        function onU() {
          h.classList.remove('active');
          document.body.classList.remove('resizing', 'resizing-v');
          window.removeEventListener('mousemove', onM);
          window.removeEventListener('mouseup', onU);
        }
        window.addEventListener('mousemove', onM);
        window.addEventListener('mouseup', onU);
      });
    }
    setupResize('resize-sidebar', 'h', 'left-sidebar', 140, 400, (el, v) => { el.style.width = v + 'px'; });
    setupResize('resize-detail-split', 'h', 'detail-left', 120, 500, (el, v) => { el.style.width = v + 'px'; });

    // Detail panel — inverted (drag up = bigger)
    (function() {
      const h = document.getElementById('resize-detail');
      h.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const panel = document.getElementById('detail-panel');
        const startY = e.clientY, startH = panel.offsetHeight;
        h.classList.add('active');
        document.body.classList.add('resizing-v');
        function onM(e) {
          panel.style.height = Math.max(80, Math.min(window.innerHeight - 200, startH + startY - e.clientY)) + 'px';
        }
        function onU() {
          h.classList.remove('active');
          document.body.classList.remove('resizing-v');
          window.removeEventListener('mousemove', onM);
          window.removeEventListener('mouseup', onU);
        }
        window.addEventListener('mousemove', onM);
        window.addEventListener('mouseup', onU);
      });
    })();

    // Recalculate sidebar heights when sidebar resizes
    new ResizeObserver(() => updateSidebarHeights()).observe(document.getElementById('left-sidebar'));

    connect();
  </script>
</body>
</html>
