<h2>Station Design System</h2>
<p class="subtitle">Shape = action type, Color = who did it</p>

<div style="display:flex;gap:32px;margin:24px 0;flex-wrap:wrap;">

  <!-- User color column -->
  <div style="flex:1;min-width:280px;">
    <div style="font-size:0.75em;text-transform:uppercase;letter-spacing:0.5px;color:#6e7681;margin-bottom:12px;display:flex;align-items:center;gap:6px;">
      <span style="width:10px;height:10px;border-radius:50%;background:#e6edf3;display:inline-block;"></span>
      User actions (bright)
    </div>

    <svg width="300" height="200" viewBox="0 0 300 200">
      <!-- User prompt — large circle -->
      <circle cx="40" cy="30" r="10" fill="#0a0e14" stroke="#e6edf3" stroke-width="2.5"/>
      <text x="65" y="28" fill="#e6edf3" font-size="12" font-family="system-ui" font-weight="600">Prompt</text>
      <text x="65" y="42" fill="#6e7681" font-size="10" font-family="system-ui">Your message to Claude</text>

      <!-- User decision — diamond -->
      <rect x="34" y="78" width="12" height="12" transform="rotate(45 40 84)" fill="#0a0e14" stroke="#e6edf3" stroke-width="2"/>
      <text x="65" y="82" fill="#e6edf3" font-size="12" font-family="system-ui" font-weight="600">Decision</text>
      <text x="65" y="96" fill="#6e7681" font-size="10" font-family="system-ui">Branch, checkout, resolve</text>

      <!-- User insight — diamond filled -->
      <rect x="34" y="134" width="12" height="12" transform="rotate(45 40 140)" fill="#f0883e" stroke="#f0883e" stroke-width="1.5"/>
      <text x="65" y="138" fill="#f0883e" font-size="12" font-family="system-ui" font-weight="600">Insight</text>
      <text x="65" y="152" fill="#6e7681" font-size="10" font-family="system-ui">Saved finding from a branch</text>
    </svg>
  </div>

  <!-- Claude color column -->
  <div style="flex:1;min-width:280px;">
    <div style="font-size:0.75em;text-transform:uppercase;letter-spacing:0.5px;color:#6e7681;margin-bottom:12px;display:flex;align-items:center;gap:6px;">
      <span style="width:10px;height:10px;border-radius:50%;background:#484f58;display:inline-block;"></span>
      Agent actions (muted)
    </div>

    <svg width="300" height="200" viewBox="0 0 300 200">
      <!-- Edit — small circle -->
      <circle cx="40" cy="30" r="6" fill="#0a0e14" stroke="#484f58" stroke-width="1.5"/>
      <text x="58" y="25" fill="#8b949e" font-size="12" font-family="system-ui">Edit / Write</text>
      <text x="58" y="39" fill="#484f58" font-size="10" font-family="system-ui">File modification</text>

      <!-- Bash — small square -->
      <rect x="34" y="72" width="12" height="12" rx="2" fill="#0a0e14" stroke="#484f58" stroke-width="1.5"/>
      <text x="58" y="79" fill="#8b949e" font-size="12" font-family="system-ui">Bash</text>
      <text x="58" y="93" fill="#484f58" font-size="10" font-family="system-ui">Command execution</text>

      <!-- Search — small triangle -->
      <polygon points="40,66 34,78 46,78" transform="translate(0,46)" fill="#0a0e14" stroke="#484f58" stroke-width="1.5"/>
      <text x="58" y="133" fill="#8b949e" font-size="12" font-family="system-ui">Grep / Glob</text>
      <text x="58" y="147" fill="#484f58" font-size="10" font-family="system-ui">Search / file lookup</text>

      <!-- Read — small dash/line -->
      <line x1="33" y1="184" x2="47" y2="184" stroke="#484f58" stroke-width="3" stroke-linecap="round"/>
      <text x="58" y="182" fill="#8b949e" font-size="12" font-family="system-ui">Read</text>
      <text x="58" y="196" fill="#484f58" font-size="10" font-family="system-ui">File read (minimal)</text>
    </svg>
  </div>
</div>

<!-- Example line showing the rhythm -->
<div style="margin-top:16px;">
  <div style="font-size:0.75em;text-transform:uppercase;letter-spacing:0.5px;color:#6e7681;margin-bottom:12px;">
    Example: how a conversation looks on the map
  </div>
  <div style="background:#0a0e14;border-radius:8px;padding:24px;border:1px solid #1b2028;">
    <svg width="100%" height="80" viewBox="0 0 700 80" preserveAspectRatio="xMidYMid meet">
      <!-- Main line -->
      <line x1="20" y1="40" x2="680" y2="40" stroke="#58a6ff" stroke-width="3" opacity="0.6"/>

      <!-- User prompt (large bright circle) -->
      <circle cx="40" cy="40" r="9" fill="#0a0e14" stroke="#e6edf3" stroke-width="2.5"/>
      <text x="40" y="62" text-anchor="middle" fill="#e6edf3" font-size="8" font-family="system-ui">prompt</text>

      <!-- Claude reads (dashes) -->
      <line x1="93" y1="40" x2="107" y2="40" stroke="#484f58" stroke-width="3" stroke-linecap="round"/>
      <line x1="133" y1="40" x2="147" y2="40" stroke="#484f58" stroke-width="3" stroke-linecap="round"/>

      <!-- Claude searches (triangle) -->
      <polygon points="190,32 184,48 196,48" fill="#0a0e14" stroke="#484f58" stroke-width="1.5"/>

      <!-- Claude edits (small circles) -->
      <circle cx="240" cy="40" r="5" fill="#0a0e14" stroke="#484f58" stroke-width="1.5"/>
      <circle cx="280" cy="40" r="5" fill="#0a0e14" stroke="#484f58" stroke-width="1.5"/>

      <!-- Claude bash (small square) -->
      <rect x="314" y="34" width="12" height="12" rx="2" fill="#0a0e14" stroke="#484f58" stroke-width="1.5"/>

      <!-- User prompt again (large bright circle) — new turn -->
      <circle cx="380" cy="40" r="9" fill="#0a0e14" stroke="#e6edf3" stroke-width="2.5"/>
      <text x="380" y="62" text-anchor="middle" fill="#e6edf3" font-size="8" font-family="system-ui">prompt</text>

      <!-- User branches (diamond bright) -->
      <rect x="434" y="34" width="10" height="10" transform="rotate(45 439 39)" fill="#0a0e14" stroke="#e6edf3" stroke-width="2"/>
      <text x="439" y="62" text-anchor="middle" fill="#e6edf3" font-size="7" font-family="system-ui">branch</text>

      <!-- More Claude work -->
      <circle cx="500" cy="40" r="5" fill="#0a0e14" stroke="#484f58" stroke-width="1.5"/>
      <polygon points="550,32 544,48 556,48" fill="#0a0e14" stroke="#484f58" stroke-width="1.5"/>
      <circle cx="600" cy="40" r="5" fill="#0a0e14" stroke="#484f58" stroke-width="1.5"/>

      <!-- Insight (filled diamond, orange) -->
      <rect x="644" y="34" width="10" height="10" transform="rotate(45 649 39)" fill="#f0883e" stroke="#f0883e" stroke-width="1"/>
      <text x="649" y="62" text-anchor="middle" fill="#f0883e" font-size="7" font-family="system-ui">insight</text>
    </svg>
  </div>
  <div style="font-size:0.75em;color:#6e7681;margin-top:8px;">
    Bright stations = you. Muted stations = Claude. You instantly see the human-agent rhythm.
  </div>
</div>
