        <tspan fill="#7ee787">~/my-project</tspan><tspan fill="#8b949e"> $ </tspan><tspan fill="#c9d1d9">npx neurobuttr-mcp init</tspan>
      </text>
      <text y="20" font-family="'SF Mono', 'Fira Code', Menlo, monospace" font-size="13">
        <tspan fill="#7ee787">&#x2713;</tspan><tspan fill="#c9d1d9"> MCP server registered in ~/.claude.json</tspan>
