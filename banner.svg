        <tspan fill="#7ee787">&#x2713;</tspan><tspan fill="#c9d1d9"> On branch </tspan><tspan fill="#d2a8ff">main</tspan><tspan fill="#c9d1d9"> &#x2014; ready to explore.</tspan>
      </text>
      <!-- Animated command examples -->
      <text y="228" font-family="'SF Mono', 'Fira Code', Menlo, monospace" font-size="13" opacity="0" xml:space="preserve"><tspan fill="#d2a8ff">&#x276F; </tspan><tspan fill="#2db5b5">/branch</tspan><tspan fill="#c9d1d9"> explore-redis-caching</tspan>
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.18;0.2;1" dur="15s" repeatCount="indefinite"/>
      </text>
      <text y="228" font-family="'SF Mono', 'Fira Code', Menlo, monospace" font-size="13" opacity="0" xml:space="preserve"><tspan fill="#d2a8ff">&#x276F; </tspan><tspan fill="#2db5b5">/map</tspan><tspan fill="#c9d1d9"> Show me the conversation tree</tspan>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.2;0.22;0.38;0.4;1" dur="15s" repeatCount="indefinite"/>
      </text>
      <text y="228" font-family="'SF Mono', 'Fira Code', Menlo, monospace" font-size="13" opacity="0" xml:space="preserve"><tspan fill="#d2a8ff">&#x276F; </tspan><tspan fill="#f5d04e">nb_timeline_capture</tspan><tspan fill="#c9d1d9"> Record this session</tspan>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.4;0.42;0.58;0.6;1" dur="15s" repeatCount="indefinite"/>
      </text>
      <text y="228" font-family="'SF Mono', 'Fira Code', Menlo, monospace" font-size="13" opacity="0" xml:space="preserve"><tspan fill="#d2a8ff">&#x276F; </tspan><tspan fill="#2db5b5">nb_checkout</tspan><tspan fill="#c9d1d9"> Switch to auth-refactor branch</tspan>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.6;0.62;0.78;0.8;1" dur="15s" repeatCount="indefinite"/>
      </text>
      <text y="228" font-family="'SF Mono', 'Fira Code', Menlo, monospace" font-size="13" opacity="0" xml:space="preserve"><tspan fill="#d2a8ff">&#x276F; </tspan><tspan fill="#2db5b5">remember_insight</tspan><tspan fill="#c9d1d9"> Redis needs connection pooling</tspan>
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.8;0.82;0.98;1" dur="15s" repeatCount="indefinite"/>
      </text>
      <rect x="0" y="244" width="7" height="12" fill="#2db5b5" opacity="0.7" rx="1">
        <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
